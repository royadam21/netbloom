<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物关系图谱预览</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); overflow: hidden; }
        svg { width: 100vw; height: 100vh; display: block; }
        .node text { font-size: 14px; fill: white; text-shadow: 0 0 8px rgba(0,0,0,0.9); font-weight: 500; pointer-events: none; }
        .node circle { stroke: white; stroke-width: 2px; }
        .link { stroke-opacity: 0.7; }
        .link-label { font-size: 11px; fill: white; text-shadow: 0 0 5px rgba(0,0,0,0.8); pointer-events: none; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 28px; color: #ffd700; text-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 10; pointer-events: none; white-space: nowrap; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(15,25,45,0.9); padding: 12px 18px; border-radius: 10px; font-size: 13px; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .stats span { color: #ffd700; font-weight: bold; }
        .zoom-controls { position: fixed; bottom: 20px; right: 20px; background: rgba(15,25,45,0.9); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 8px; }
        .zoom-controls button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .zoom-controls button:hover { background: rgba(102,126,234,0.3); }
        .zoom-level { text-align: center; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="title" id="graphTitle">人物关系图谱</div>
    <svg id="graph"></svg>
    <div class="stats">👥 人物: <span id="statChars">0</span> | 🔗 关系: <span id="statRels">0</span></div>
    <div class="zoom-controls">
        <div class="zoom-level">🔍 <span id="zoomLevel">100%</span></div>
        <button onclick="zoomIn()">➕ 放大</button>
        <button onclick="zoomOut()">➖ 缩小</button>
        <button onclick="resetZoom()">⟳ 重置</button>
    </div>

    <script>
        let svg, g, simulation, zoom;
        const width = window.innerWidth, height = window.innerHeight;
        
        async function init() {
            // 加载数据
            let data;
            try {
                const res = await fetch('data.json');
                data = await res.json();
            } catch (e) {
                console.error('加载数据失败');
                return;
            }
            
            // 标题
            document.getElementById('graphTitle').textContent = data.graphName || '人物关系图谱';
            document.getElementById('statChars').textContent = data.nodes.length;
            document.getElementById('statRels').textContent = data.links.length;
            
            // 分组颜色
            const groupColors = {};
            for (const [k, v] of Object.entries(data.groups || {})) {
                groupColors[k] = v.color;
            }
            
            const relationColors = {
                'brother': '#ff6b6b', 'teacher': '#f7dc6f', 'master': '#4ecdc4',
                'friend': '#45b7d1', 'enemy': '#dda0dd', 'family': '#ff6b6b',
                'lover': '#ffd700', 'rival': '#bb8fce', 'default': '#ffffff'
            };
            
            // SVG
            svg = d3.select('#graph').attr('width', width).attr('height', height);
            g = svg.append('g');
            
            // 缩放
            zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => {
                g.attr('transform', e.transform);
                document.getElementById('zoomLevel').textContent = Math.round(e.transform.k * 100) + '%';
            });
            svg.call(zoom);
            
            // 力导向图
            simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.links.map(l => ({
                    ...l, source: l.source.id || l.source, target: l.target.id || l.target
                }))).id(d => d.id).distance(150))
                .force('charge', d3.forceManyBody().strength(-500))
                .force('center', d3.forceCenter(width/2, height/2))
                .force('collision', d3.forceCollide().radius(50));
            
            // 连线
            const links = g.append('g').selectAll('line').data(data.links).enter()
                .append('line').attr('class', 'link')
                .attr('stroke', d => relationColors[d.type] || relationColors.default)
                .attr('stroke-width', 2.5);
            
            // 连线标签
            const linkLabels = g.append('g').selectAll('text').data(data.links).enter()
                .append('text').attr('class', 'link-label').attr('text-anchor', 'middle')
                .attr('dy', -5).style('opacity', 0.8)
                .text(d => d.relation || '');
            
            // 节点
            const nodes = g.append('g').selectAll('g').data(data.nodes).enter()
                .append('g').attr('class', 'node')
                .call(d3.drag()
                    .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
                    .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
                    .on('end', (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));
            
            nodes.append('circle').attr('r', d => d.size || 12)
                .attr('fill', d => { const gid = d.groups && d.groups[0]; return gid && groupColors[gid] ? groupColors[gid] : '#666'; });
            nodes.append('text').attr('dx', 18).attr('dy', 5).text(d => d.id);
            
            simulation.on('tick', () => {
                links.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                     .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                linkLabels.attr('x', d => (d.source.x + d.target.x) / 2)
                          .attr('y', d => (d.source.y + d.target.y) / 2 - 8);
                nodes.attr('transform', d => 'translate('+d.x+','+d.y+')');
            });
        }
        
        function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.3); }
        function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.7); }
        function resetZoom() { svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity); }
        
        init();
    </script>
</body>
</html>
