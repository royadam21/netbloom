<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>网罗众生--人物关系图谱编辑器</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .editor-panel {
            width: 420px;
            background: rgba(15, 25, 45, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: width 0.35s ease, opacity 0.35s ease;
            overflow: hidden;
        }

        .editor-panel.collapsed {
            width: 0;
            opacity: 0;
            pointer-events: none;
        }

        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .editor-footer {
            padding: 15px 20px;
            background: rgba(15, 25, 45, 0.98);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .editor-footer-top {
            display: flex;
            gap: 10px;
        }

        .editor-footer-sync {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: #888;
        }

        .sync-status {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sync-status:hover {
            color: #fff;
        }

        .panel-title {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title-btn {
            font-size: 14px;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .panel-title-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .graph-name-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 15px;
            outline: none;
            margin-bottom: 12px;
            text-align: center;
        }

        .graph-name-input:focus {
            border-color: #667eea;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: #1a1a2e;
            color: #fff;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: #fff;
        }

        .btn-success {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: #fff;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f7dc6f 0%, #f39c12 100%);
            color: #1a1a2e;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            margin: 2px;
        }

        .btn-icon {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #888;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .preview-panel {
            min-height: 0;
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        #graph {
            width: 100%;
            height: 100%;
        }

        .node circle {
            stroke: #fff;
            stroke-width: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .node:hover circle {
            stroke-width: 4px;
            stroke: #ffd700;
        }

        .node text {
            font-size: 12px;
            fill: #ffffff;
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            font-weight: 500;
        }

        .link {
            stroke-opacity: 0.7;
            cursor: pointer;
        }

        .link:hover {
            stroke-opacity: 1;
            stroke-width: 4px !important;
        }

        .link-label {
            font-size: 10px;
            fill: #fff;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }

        .node-label {
            fill: rgba(255, 255, 255, 0.85);
            font-size: 10px;
            font-family: sans-serif;
            pointer-events: none;
            text-anchor: start;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item-info {
            flex: 1;
            min-width: 0;
        }

        .list-item-name {
            font-size: 13px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item-desc {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .relation-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid;
        }

        .relation-info {
            flex: 1;
            min-width: 0;
        }

        .relation-names {
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .relation-type {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }

        .list-item-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        #tooltip {
            position: fixed;
            padding: 12px 16px;
            background: rgba(15, 25, 45, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            max-width: 280px;
            z-index: 10000;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        #tooltip.visible {
            opacity: 1;
        }

        #tooltip h3 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #ffd700;
        }

        #tooltip p {
            margin: 4px 0;
            color: #ccc;
            line-height: 1.4;
        }

        .tooltip-relation {
            display: inline-block;
            padding: 3px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
        }

        .stats-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 25, 45, 0.9);
            padding: 10px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            display: flex;
            gap: 15px;
        }

        .stats-bar span {
            color: #ffd700;
            font-weight: bold;
        }

        .zoom-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 25, 45, 0.9);
            padding: 8px 12px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
        }

        .group-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .group-checkbox-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .group-checkbox-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .group-checkbox-item.selected {
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid #667eea;
        }

        .group-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .group-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 10px;
            margin: 1px;
        }

        .group-tag .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 4px 0;
            user-select: none;
        }

        .collapsible-header .arrow {
            font-size: 11px;
            transition: transform 0.2s;
            color: #666;
        }

        .collapsible-header.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .collapsible-content {
            max-height: 400px;
            overflow-y: auto;
        }

        .collapsible-content.hidden {
            display: none;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
        }

        .pagination button {
            padding: 4px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            font-size: 11px;
        }

        .pagination button:hover:not(:disabled) {
            background: rgba(102, 126, 234, 0.3);
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination .page-info {
            font-size: 11px;
            color: #666;
        }

        /* 弹窗样式 */

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }

        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            min-width: 360px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-footer .btn {
            flex: 1;
        }

        /* 图谱列表 */

        .graph-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .graph-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .graph-list-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .graph-list-item.active {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid #667eea;
        }

        .graph-list-item-info {
            flex: 1;
        }

        .graph-list-item-name {
            font-size: 14px;
            color: #fff;
        }

        .graph-list-item-meta {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .graph-list-item-actions {
            display: flex;
            gap: 4px;
        }

        .graph-list-empty {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 13px;
        }

        /* 右键菜单 */

        .context-menu {
            position: fixed;
            background: rgba(20, 30, 50, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 6px 0;
            min-width: 150px;
            z-index: 10001;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
        }

        .context-menu.visible {
            display: block;
        }

        .context-menu-item {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-menu-item:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .context-menu-item.danger {
            color: #ff6b6b;
        }

        .context-menu-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 4px 0;
        }

        /* 拖拽区域 */

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 13px;
            transition: all 0.2s;
        }

        .drop-zone.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #fff;
        }

        /* 同步状态 */

        .sync-icon {
            font-size: 14px;
        }

        .sync-icon.synced {
            color: #4ecdc4;
        }

        .sync-icon.syncing {
            color: #f7dc6f;
        }

        .sync-icon.offline {
            color: #888;
        }

        .sync-icon.error {
            color: #ff6b6b;
        }

        .expand-btn {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 9999;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 12px 10px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-size: 18px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
        }

        .expand-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .expand-btn:hover {
            background: linear-gradient(135deg, #7a8ff0 0%, #8a5cb8 100%);
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(15, 25, 45, 0.98);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            height: 50px;
            box-sizing: border-box;
        }

        .top-bar.collapsed {
            display: none;
        }


        .graph-title {
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            flex: 1;
            min-width: 100px;
            padding: 0 15px;
            line-height: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .top-bar-right {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .top-bar-right .btn {
            width: auto;
            min-width: 90px;
            flex-shrink: 0;
        }


        .top-bar-btns {
            display: flex;
            gap: 10px;
        }

        .graph-area {
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }

        .graph-area svg {
            width: 100%;
            height: 100%;
        }

        .float-btn {
            position: absolute;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .char-float-btn {
            top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .rel-float-btn {
            top: 78px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }

        .edit-float-btn {
            top: 138px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .drawer-panel {
            position: fixed;
            top: 0;
            right: -380px;
            width: 360px;
            height: 100vh;
            background: rgba(15, 25, 45, 0.98);
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 1001;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        .drawer-panel.open {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 15px;
            color: #fff;
            font-weight: 600;
        }

        .drawer-close {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
        }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .drawer-body .section {
            margin-bottom: 15px;
        }

        .drawer-body .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 6px 0;
            color: #fff;
        }

        .drawer-body .hidden {
            display: none;
        }

        .drawer-body .pagination {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .drawer-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats-bar,
        .zoom-bar {
            position: absolute;
            background: rgba(15, 25, 45, 0.9);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 12px;
            z-index: 100;
        }

        .stats-bar {
            bottom: 20px;
            right: 20px;
        }

        .zoom-bar {
            bottom: 20px;
            left: 20px;
        }
    </style>

</head>

<body>
    <div class="top-bar">
        <div class="graph-title" id="graphTitleDisplay">未命名图谱</div>
        <div class="top-bar-right">
            <button class="btn btn-primary" onclick="showGraphList()">📚 我的图谱</button>
        </div>
    </div>
    <div class="graph-area">
        <div class="preview-panel">

            <svg id="graph">

                <defs>

                </defs>
            </svg>

            <div id="tooltip">

                <h3 id="tooltip-name"></h3>

                <p id="tooltip-info"></p>

                <p id="tooltip-relation"></p>

            </div>
            <div class="stats-bar">👥 <span id="statChars">0</span> | 🔗 <span id="statRels">0</span></div>
            <div class="zoom-bar">🔍 <span id="zoomPercent">100%</span></div>

        <div class="context-menu" id="contextMenu">

            <div class="context-menu-item" onclick="ctxViewRelations()">🔗 查看关系</div>

            <div class="context-menu-separator"></div>

        <!-- 缺失元素占位 - 让 JS getElementById 不报错 --><span id="syncIcon" style="display:none"></span><span id="syncText"
            style="display:none"></span><span id="lastSaveTime" style="display:none"></span>
        <div id="groupCheckboxes" style="display:none"></div><input id="newGroupName" style="display:none"><input
            id="newGroupColor" style="display:none"><input id="relSource" style="display:none"><input id="relTarget"
            style="display:none"><select id="relType" style="display:none"></select><input id="relDesc"
            style="display:none"><input id="charName" style="display:none"><input id="charInfo" style="display:none">
        <div id="charList" style="display:none"></div>
        <div id="charPagination" style="display:none"></div>
        <div id="relList" style="display:none"></div>
        <div id="relPagination" style="display:none"></div>
        <script>
            // ============== 全局状态 ==============
            let data = {
                graphId: null,
                graphName: '',
                nodes: [],
                links: [],
                groups: { 1: { name: '男主角', color: '#ff6b6b' }, 2: { name: '女主角', color: '#ffd700' }, 3: { name: '大反派', color: '#9b59b6' } },
                nextGroupId: 4
            };
            const PAGE_SIZE = 10;
            let charPage = 0, relPage = 0, charCollapsed = false, relCollapsed = false;
            let currentGraphId = null;
            let syncStatus = 'synced';
            let syncRetryCount = 0;
            let pendingConfirmAction = null;
            let pendingImportData = null;
            let contextMenuTarget = null;
            let saveTimer = null;
            let zoomLevel = 1;
            const relationColors = { 'brother': '#ff6b6b', 'teacher': '#f7dc6f', 'master': '#4ecdc4', 'friend': '#45b7d1', 'enemy': '#dda0dd', 'family': '#ff6b6b', 'lover': '#ffd700', 'rival': '#bb8fce', 'default': '#ffffff' };
            const relationNames = { 'brother': '结义兄弟', 'teacher': '师徒', 'master': '主仆', 'friend': '朋友', 'enemy': '敌对', 'family': '亲人', 'lover': '恋人', 'rival': '竞争' };
            const API_BASE = 'https://netbloom.1tik.top/api';
            let svg, g, simulation, currentZoom, container;
            // ============== 初始化 ==============
            window.onload = async function () {
                // 尝试从localStorage加载
                data = { graphName: "", nodes: [], links: [], groups: {}, nextGroupId: 4 }; // 默认值
                const saved = localStorage.getItem('characterNetworkData');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        currentGraphId = parsed.graphId;
                        if (parsed.data) {
                            data = parsed.data;
                        }
                        const gn = document.getElementById('graphName'); if (gn) gn.value = data.graphName || '';
                    } catch (e) { }
                }
                // 初始化图谱
                initGraph();
                // 从云端加载
                await loadFromCloud();
                // 检查URL参数是否有graphId，有则自动加载对应图谱
                const gtDisplay = document.getElementById("graphTitleDisplay"); if (gtDisplay) gtDisplay.textContent = data.graphName || "未命名图谱";
                const urlParams = new URLSearchParams(window.location.search);
                const urlGraphId = urlParams.get('graphId');
                if (urlGraphId) {
                    await switchGraph(urlGraphId);
                } else {
                    updateGraphTitle();
                    showGraphList();
                }
                updateGroupCheckboxes();
                updateCharSelect();
                updateCharList();
                updateRelList();
                updateGraph();
                initContextMenu();
            };
            async function loadFromCloud() {
                if (!currentGraphId) {
                    // 获取第一个图谱
                    try {
                        const res = await fetch(`${API_BASE}/graphs`);
                        const result = await res.json();
                        if (result.graphs && result.graphs.length > 0) {
                            await switchGraph(result.graphs[0].id);
                        } else {
                            // 创建默认图谱
                            await createDefaultGraph();
                        }
                    } catch (e) {
                        console.log('云端不可用，使用本地数据');
                        setSyncStatus('offline');
                    }
                } else {
                    await switchGraph(currentGraphId);
                }
            }
            async function createDefaultGraph() {
                try {
                    const res = await fetch(`${API_BASE}/graphs`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: '我的图谱', data: { graphName: '我的图谱', nodes: [], links: [], groups: data.groups, nextGroupId: 4 } })
                    });
                    const result = await res.json();
                    currentGraphId = result.id;
                    data.graphId = result.id;
                } catch (e) {
                    console.log('创建默认图谱失败');
                }
            }
            async function switchGraph(graphId) {
                try {
                    setSyncStatus('syncing');
                    const res = await fetch(`${API_BASE}/graphs/${graphId}`);
                        if (!res.ok) { console.error("图谱不存在:", res.status); setSyncStatus("error"); return; }
                    const result = await res.json();
                    currentGraphId = graphId;
                    data = result.data;
                    // 规范化 links：用 nodeMap 重新映射 source/target 为节点对象引用
                    data = data || {}; // 确保 data 存在
                    data.nodes = data.nodes || []; // 确保 nodes 存在
                    data.links = data.links || []; // 确保 links 存在
                    data.graphId = graphId;
                    updateGraphTitle();
                    const gn = document.getElementById('graphName'); if (gn) gn.value = data.graphName || '';
                    charPage = 0; relPage = 0;
                    updateGroupCheckboxes();
                    updateCharSelect();
                    updateCharList();
                    updateRelList();
                    updateGraph();
                    saveToLocal();
                    setSyncStatus('synced');
                } catch (e) {
                    console.error('加载图谱失败:', e);
                    setSyncStatus('error');
                }
            }
            // ============== 云端同步 ==============
            function setSyncStatus(status) {
                syncStatus = status;
                const icon = document.getElementById('syncIcon');
                const text = document.getElementById('syncText');
                if (icon) icon.className = 'sync-icon ' + status;
                if (status === 'synced') { if (icon) icon.textContent = '🟢'; if (text) text.textContent = '已同步'; }
                else if (status === 'syncing') { if (icon) icon.textContent = '🟡'; if (text) text.textContent = '同步中...'; }
                else if (status === 'offline') { if (icon) icon.textContent = '🔴'; if (text) text.textContent = '离线'; }
                else if (status === 'error') { if (icon) icon.textContent = '❌'; if (text) text.textContent = '同步失败'; }
            }
            function debounceSave() {
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => {
                    saveToCloud();
                }, 500);
            }
            async function saveToCloud() {
                try {
                    setSyncStatus('syncing');
                    if (!currentGraphId) {
                        // 创建新图谱
                        const res = await fetch(`${API_BASE}/graphs`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: data.graphName || '未命名图谱', data: data })
                        });
                        const result = await res.json();
                        currentGraphId = result.id;
                        data.graphId = result.id;
                    } else {
                        // 更新已有图谱
                        await fetch(`${API_BASE}/graphs/${currentGraphId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: data.graphName, data: data })
                        });
                    }
                    saveToLocal();
                    setSyncStatus('synced');
                    syncRetryCount = 0;
                    document.getElementById('lastSaveTime').textContent = `最后保存: ${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}`;
                } catch (e) {
                    console.error('保存失败:', e);
                    setSyncStatus('error');
                    if (syncRetryCount < 3) {
                        syncRetryCount++;
                        setTimeout(() => saveToCloud(), 2000);
                    }
                }
            }
            function saveToLocal() {
                localStorage.setItem('characterNetworkData', JSON.stringify({
                    graphId: currentGraphId,
                    graphName: data.graphName,
                    data: data,
                    updatedAt: new Date().toISOString()
                }));
            }
            // ============== 图谱名称 ==============
            function updateGraphTitle() {
                const gtDisplay = document.getElementById("graphTitleDisplay"); if (gtDisplay) gtDisplay.textContent = data.graphName || "未命名图谱";
            }
            // ============== 分组 ==============
            function updateGroupCheckboxes(containerId, selectedGroups) {
                const container = containerId ? document.getElementById(containerId) : document.getElementById('groupCheckboxes');
                let html = '';
                for (const [id, g] of Object.entries(data.groups || {})) {
                    const isSelected = selectedGroups ? selectedGroups.includes(parseInt(id)) : false;
                    html += `<label class="group-checkbox-item ${isSelected ? 'selected' : ''}" data-group="${id}" onclick="toggleGroupSelection(this)"><span class="group-dot" style="background:${g.color}"></span>${g.name}</label>`;
                }
                container.innerHTML = html;
            }
            function toggleGroupSelection(el) {
                el.classList.toggle('selected');
            }
            function getSelectedGroups() {
                const selected = [];
                document.querySelectorAll('#groupCheckboxes .group-checkbox-item.selected').forEach(item => { selected.push(parseInt(item.dataset.group)); });
                return selected;
            }

            // ============== 人物 ==============
            function updateCharSelect() {
                const opts = (data.nodes || []).length > 0 ? data.nodes.map(n => `<option value="${n.id}">${n.id}</option>`).join('') : '<option value="">-- 先添加人物 --</option>';
                document.getElementById('relSource').innerHTML = opts;
                document.getElementById('relTarget').innerHTML = opts;
            }

            // ============== 关系 ==============

            function updateEditRelSelect(source, target) {
                const opts = data.nodes.map(n => `<option value="${n.id}">${n.id}</option>`).join('');
                document.getElementById('editRelSource').innerHTML = opts;
                document.getElementById('editRelTarget').innerHTML = opts;
                document.getElementById('editRelSource').value = source.id || source;
                document.getElementById('editRelTarget').value = target.id || target;
            }

            // ============== 列表 ==============
            function updateCharList() {
                const list = document.getElementById('charList');
                const totalPages = Math.ceil((data.nodes || []).length / PAGE_SIZE) || 1;
                if (charPage >= totalPages) charPage = Math.max(0, totalPages - 1);
                const start = charPage * PAGE_SIZE, end = Math.min(start + PAGE_SIZE, (data.nodes || []).length);
                const pageNodes = data.nodes.slice(start, end);
                if ((data.nodes || []).length === 0) {
                    list.innerHTML = '<div style="color:#666;font-size:12px;text-align:center;padding:15px;">暂无人物，请添加或加载模板</div>';
                } else {
                    list.innerHTML = pageNodes.map((n, idx) => {
                        const realIdx = start + idx;
                        return `<div class="list-item"><div class="list-item-info"><div class="list-item-name">${n.id}</div><div class="list-item-desc">${(n.groups || []).map(gid => { const g = (data.groups && data.groups[gid]) || {color:'#666',name:''}; return `<span class="group-tag"><span class="dot" style="background:${g.color}"></span>${g.name}</span>`; }).join(' / ')}${n.info ? '<br>' + n.info : ''}</div></div></div>`;
                    }).join('');
                }
                document.getElementById('charCount').textContent = (data.nodes || []).length;
                const pagination = document.getElementById('charPagination');
                if ((data.nodes || []).length > PAGE_SIZE) {
                    pagination.innerHTML = `<button onclick="goToCharPage(${charPage - 1})" ${charPage === 0 ? 'disabled' : ''}>上一页</button><span class="page-info">${charPage + 1}/${totalPages}</span><button onclick="goToCharPage(${charPage + 1})" ${charPage >= totalPages - 1 ? 'disabled' : ''}>下一页</button>`;
                } else { pagination.innerHTML = ''; }
            }
            function updateRelList() {
                const list = document.getElementById('relList');
                const totalPages = Math.ceil((data.links || []).length / PAGE_SIZE) || 1;
                if (relPage >= totalPages) relPage = Math.max(0, totalPages - 1);
                const start = relPage * PAGE_SIZE, end = Math.min(start + PAGE_SIZE, (data.links || []).length);
                const pageLinks = (data.links || []).slice(start, end);
                if ((data.links || []).length === 0) {
                    list.innerHTML = '<div style="color:#666;font-size:12px;text-align:center;padding:15px;">暂无关系，请添加</div>';
                } else {
                    list.innerHTML = pageLinks.map((l, idx) => {
                        const realIdx = start + idx;
                        const sn = l.source.id || l.source;
                        const tn = l.target.id || l.target;
                        const color = relationColors[l.type] || relationColors.default;
                        return `<div class="relation-item" style="border-color:${color}"><div class="relation-info"><div class="relation-names">${sn} ↔ ${tn}</div><div class="relation-type">${(data.relationTypes && data.relationTypes[l.type] ? data.relationTypes[l.type].name : relationNames[l.type]) || l.type}：${l.relation || ''}</div></div></div>`;
                    }).join('');
                }
                document.getElementById('relCount').textContent = (data.links || []).length;
                const pagination = document.getElementById('relPagination');
                if (data.links.length > PAGE_SIZE) {
                    pagination.innerHTML = `<button onclick="goToRelPage(${relPage - 1})" ${relPage === 0 ? 'disabled' : ''}>上一页</button><span class="page-info">${relPage + 1}/${totalPages}</span><button onclick="goToRelPage(${relPage + 1})" ${relPage >= totalPages - 1 ? 'disabled' : ''}>下一页</button>`;
                } else { pagination.innerHTML = ''; }
            }
            function goToCharPage(page) { const totalPages = Math.ceil(data.nodes.length / PAGE_SIZE) || 1; if (page < 0 || page >= totalPages) return; charPage = page; updateCharList(); }
            function goToRelPage(page) { const totalPages = Math.ceil((data.links || []).length / PAGE_SIZE) || 1; if (page < 0 || page >= totalPages) return; relPage = page; updateRelList(); }
            // ============== 图谱列表 ==============
            async function showGraphList() {
                try {
                    const res = await fetch(`${API_BASE}/graphs`);
                    const result = await res.json();
                    const list = document.getElementById('graphListContent');
                    if (!result.graphs || result.graphs.length === 0) {
                        list.innerHTML = '<div class="graph-list-empty">还没有图谱，试试加载一个模板吧</div>';
                    } else {
                        list.innerHTML = result.graphs.map(g => `
                        <div class="graph-list-item ${g.id === currentGraphId ? 'active' : ''}" onclick="switchGraph('${g.id}')">
                            <div class="graph-list-item-info">
                                <div class="graph-list-item-name">${g.name}</div>
                                <div class="graph-list-item-meta">👥${g.node_count} 🔗${g.link_count} · ${new Date(g.updated_at).toLocaleDateString('zh-CN')}</div>
                            </div>
                            <div class="graph-list-item-actions">
                                <button class="btn-icon" onclick="event.stopPropagation();renameGraph('${g.id}','${g.name}')" title="重命名">✏️</button>
                                <button class="btn-icon" onclick="event.stopPropagation();deleteGraph('${g.id}','${g.name}');" title="删除">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                    }
                    document.getElementById('graphListModal').classList.add('visible');
                } catch (e) {
                    alert('加载图谱列表失败，请检查服务器是否运行');
                }
            }
            async function renameGraph(id, oldName) {
                const newName = prompt('请输入新名称：', oldName);
                if (!newName || !newName.trim()) { alert('图谱名称不能为空'); return; }
                if (newName.length > 50) { alert('图谱名称不能超过50字符'); return; }
                try {
                    const graph = await (await fetch(`${API_BASE}/graphs/${id}`)).json();
                    graph.name = newName.trim();
                    graph.data.graphName = newName.trim();
                    await fetch(`${API_BASE}/graphs/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(graph) });
                    if (id === currentGraphId) { data.graphName = newName.trim(); const gn = document.getElementById('graphName'); if (gn) gn.value = newName.trim(); updateGraphTitle(); }
                    showGraphList();
                } catch (e) { alert('重命名失败'); }
            }
            async function deleteGraph(id, name) {
                if (!confirm(`确定删除【${name}】吗？此操作不可恢复。`)) return;
                try {
                    await fetch(`${API_BASE}/graphs/${id}`, { method: 'DELETE' });
                    if (id === currentGraphId) {
                        localStorage.removeItem('characterNetworkData');
                        location.reload();
                    } else {
                        showGraphList();
                    }
                } catch (e) { alert('删除失败'); }
            }
            // ============== 导入导出 ==============
            function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
            function handleDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
            function handleDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); const file = e.dataTransfer.files[0]; if (file) processImportFile(file); }
            function handleFileImport(e) { const file = e.target.files[0]; if (file) processImportFile(file); }
            function handleDropImport(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); const file = e.dataTransfer.files[0]; if (file) { processImportFile(file, true); } }
            function processImportFile(file, toCloud = false) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (!json.nodes || !json.links || !json.groups) {
                            alert('缺少必要字段：nodes, links, groups'); return;
                        }
                        pendingImportData = json;
                        document.getElementById('importPreviewContent').innerHTML = `
                        <p>📖 图谱名称：<strong>${json.graphName || '未命名'}</strong></p>
                        <p>👥 人物数量：<strong>${json.nodes.length}</strong></p>
                        <p>🔗 关系数量：<strong>${json.links.length}</strong></p>
                        <p>🏷️ 分组数量：<strong>${Object.keys(json.groups).length}</strong></p>
                    `;
                        document.getElementById('importPreviewModal').classList.add('visible');
                    } catch (err) { alert('文件格式错误，请选择有效的图谱JSON文件'); }
                };
                reader.readAsText(file);
            }
            function confirmImport() {
                if (!pendingImportData) return;
                data = pendingImportData;
                data.graphId = null;
                charPage = 0; relPage = 0;
                const gn = document.getElementById('graphName'); if (gn) gn.value = data.graphName || '';
                updateGroupCheckboxes();
                updateCharSelect();
                updateCharList();
                updateRelList();
                updateGraph();
                debounceSave();
                pendingImportData = null;
                closeModal('importPreviewModal');
            }
            // ============== 全屏预览 ==============
            function collapseEditor() { const panel = document.querySelector('.editor-panel'); panel.classList.add('collapsed'); document.getElementById('expandBtn').classList.add('visible'); }
            function expandEditor() { const panel = document.querySelector('.editor-panel'); panel.classList.remove('collapsed'); document.getElementById('expandBtn').classList.remove('visible'); }
            function initGraph() {
                svg = d3.select('#graph');
                container = document.querySelector('.preview-panel');
                svg.attr('width', container.clientWidth).attr('height', container.clientHeight);
                g = svg.append('g');
                currentZoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', (e) => {
                    g.attr('transform', e.transform);
                    zoomLevel = e.transform.k;
                    document.getElementById('zoomPercent').textContent = Math.round(zoomLevel * 100) + '%';
                });
                svg.call(currentZoom);
                simulation = d3.forceSimulation().force('link', d3.forceLink().id(d => d.id).distance(80)).force('charge', d3.forceManyBody().strength(-800)).force('center', d3.forceCenter(container.clientWidth / 2, container.clientHeight / 2)).force('collision', d3.forceCollide().radius(30));
            }
            function updateGraph() {
                // 规范化 links
                const nodeMap = {};
                data.nodes.forEach(n => nodeMap[n.id] = n);
                const normalizedLinks = data.links.map(l => ({
                    ...l,
                    source: nodeMap[l.source.id || l.source] || l.source,
                    target: nodeMap[l.target.id || l.target] || l.target
                }));
                const links = g.selectAll('.link').data(normalizedLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
                links.exit().remove();
                links.enter().append('line').attr('class', 'link').attr('stroke', d => relationColors[d.type] || relationColors.default).attr('stroke-width', 2.5).on('mouseover', showLinkTooltip).on('mouseout', hideTooltip);
                links.raise();
                const linkLabels = g.selectAll('.link-label').data(normalizedLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
                linkLabels.exit().remove();
                linkLabels.enter().append('text').attr('class', 'link-label').attr('text-anchor', 'middle').attr('dy', -5).style('opacity', 0.8).text(d => { const t = data.relationTypes && data.relationTypes[d.type]; return t ? t.name : (d.relation || relationNames[d.type] || d.type); });
                const nodes = g.selectAll('.node').data(data.nodes, d => d.id);
                nodes.exit().remove();
                const nodeEnter = nodes.enter().append('g').attr('class', 'node').call(d3.drag().on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }).on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; }).on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })).on('mouseover', showNodeTooltip).on('mouseout', hideTooltip).on('contextmenu', showRightClickMenu);
                nodeEnter.append('circle').attr('r', d => d.size || 12).attr('fill', d => { const gid = d.groups && d.groups[0]; return gid && data.groups[gid] ? data.groups[gid].color : '#666'; });
                nodeEnter.append('text').attr('dx', 16).attr('dy', 4).text(d => d.id);
                
                simulation.nodes(data.nodes);
                simulation.force('link').links(normalizedLinks);
                simulation.alpha(0.8).restart();
                simulation.on('tick', () => {
                    const nodeRadius = d => d.size || 12; g.selectAll('.link').attr('x1', d => { const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y, dist = Math.sqrt(dx * dx + dy * dy) || 1; return d.source.x + dx / dist * nodeRadius(d.source); }).attr('y1', d => { const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y, dist = Math.sqrt(dx * dx + dy * dy) || 1; return d.source.y + dy / dist * nodeRadius(d.source); }).attr('x2', d => { const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y, dist = Math.sqrt(dx * dx + dy * dy) || 1; return d.target.x - dx / dist * nodeRadius(d.target); }).attr('y2', d => { const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y, dist = Math.sqrt(dx * dx + dy * dy) || 1; return d.target.y - dy / dist * nodeRadius(d.target); });
                    g.selectAll('.link-label').attr('x', d => (d.source.x + d.target.x) / 2).attr('y', d => (d.source.y + d.target.y) / 2 - 8).attr('font-size', '11px').text(d => { const t = data.relationTypes && data.relationTypes[d.type]; return t ? t.name : (d.relation || relationNames[d.type] || ''); });
                    g.selectAll('.node').attr('transform', d => `translate(${d.x},${d.y})`);
                    // 对孤立节点（没有关系）施加向中心的拉力，防止飘走
                    const connected = new Set();
                    (data.links || []).forEach(l => { connected.add(l.source.id || l.source); connected.add(l.target.id || l.target); });
                    const cx = container ? container.clientWidth / 2 : 400;
                    const cy = container ? container.clientHeight / 2 : 300;
                    data.nodes.forEach(n => {
                        if (!connected.has(n.id)) {
                            n.x += (cx - n.x) * 0.01;
                            n.y += (cy - n.y) * 0.01;
                        }
                    });
                });
                updateStats();
            }
            function updateStats() {
                document.getElementById('statChars').textContent = data.nodes.length;
                document.getElementById('statRels').textContent = data.links.length;
            }
            function showNodeTooltip(event, d) {
                const tooltip = document.getElementById('tooltip');
                document.getElementById('tooltip-name').textContent = d.id;
                const groupsHtml = (d.groups || []).map(gid => { const g2 = data.groups[gid]; return g2 ? `<span class="tooltip-relation" style="background:${g2.color};margin-right:3px;">${g2.name}</span>` : ''; }).join('');
                const infoHtml = d.info ? `<p style="margin:6px 0 0;color:#ccc;font-size:12px;">${d.info}</p>` : '';
                document.getElementById('tooltip-info').innerHTML = groupsHtml + infoHtml;
                const relatedLinks = data.links.filter(l => (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id);
                const relHtml = relatedLinks.map(l => { const isSource = (l.source.id || l.source) === d.id; const other = isSource ? (l.target.id || l.target) : (l.source.id || l.source); const relName = (data.relationTypes && data.relationTypes[l.type]) ? data.relationTypes[l.type].name : (relationNames[l.type] || l.type); const extra = l.relation ? ':' + l.relation : ''; return isSource ? `<span class="tooltip-relation">${relName} → ${other}${extra}</span>` : `<span class="tooltip-relation">${other} → ${relName}${extra}</span>`; }).join(' ');
                document.getElementById('tooltip-relation').innerHTML = relHtml;
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY - 10 + 'px';
                tooltip.classList.add('visible');
                contextMenuTarget = d;
            }
            function showLinkTooltip(event, d) {
                const tooltip = document.getElementById('tooltip');
                document.getElementById('tooltip-name').textContent = (data.relationTypes && data.relationTypes[d.type]) ? data.relationTypes[d.type].name : (relationNames[d.type] || d.type);
                document.getElementById('tooltip-info').textContent = `${d.source.id || d.source} → ${d.target.id || d.target}`;
                document.getElementById('tooltip-relation').innerHTML = d.relation ? `<span class="tooltip-relation">${d.relation}</span>` : '';
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY - 10 + 'px';
                tooltip.classList.add('visible');
            }
            function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }
            // ============== 右键菜单 ==============
            function initContextMenu() {
                document.addEventListener('click', () => { document.getElementById('contextMenu').classList.remove('visible'); });
            }
            function showRightClickMenu(event, d) {
                event.preventDefault();
                contextMenuTarget = d;
                const menu = document.getElementById('contextMenu');
                menu.style.left = event.clientX + 'px';
                menu.style.top = event.clientY + 'px';
                menu.classList.add('visible');
            }

            function ctxViewRelations() { document.getElementById('contextMenu').classList.remove('visible'); if (contextMenuTarget) { const related = data.links.filter(l => (l.source.id || l.source) === contextMenuTarget.id || (l.target.id || l.target) === contextMenuTarget.id); alert(`【${contextMenuTarget.id}】的关系：\n${related.map(l => `${l.source.id || l.source} ${relationNames[l.type] || l.type} ${l.target.id || l.target}${l.relation ? ' (' + l.relation + ')' : ''}`).join('\n') || '无'}`); } }
            function ctxCopyName() { document.getElementById('contextMenu').classList.remove('visible'); if (contextMenuTarget) { navigator.clipboard.writeText(contextMenuTarget.id); } }

            // ============== 弹窗 ==============
            function showConfirm(title, message, action) {
                document.getElementById('confirmTitle').textContent = title;
                document.getElementById('confirmMessage').textContent = message;
                pendingConfirmAction = action;
                document.getElementById('confirmModal').classList.add('visible');
            }
            function confirmAction() {
                if (pendingConfirmAction) pendingConfirmAction();
                closeModal('confirmModal');
            }
            function closeModal(id) { document.getElementById(id).classList.remove('visible'); }
            // ============== 模板 ==============
            window.onresize = function () { if (svg) { container = document.querySelector('.preview-panel'); svg.attr('width', container.clientWidth).attr('height', container.clientHeight); } };

            function openCharDrawer() {
                document.getElementById('charDrawer').classList.add('open');
                document.getElementById('drawerOverlay').classList.add('visible');
            }
            function closeCharDrawer() {
                document.getElementById('charDrawer').classList.remove('open');
                document.getElementById('drawerOverlay').classList.remove('visible');
            }
            function openRelDrawer() {
                document.getElementById('relDrawer').classList.add('open');
                document.getElementById('drawerOverlay').classList.add('visible');
            }
            function closeRelDrawer() {
                document.getElementById('relDrawer').classList.remove('open');
                document.getElementById('drawerOverlay').classList.remove('visible');
            }
            function closeAllDrawers() { closeCharDrawer(); closeRelDrawer(); }
            function centerOnMostConnected() {
                if (!data.nodes || data.nodes.length === 0) return;
                const connCount = {}; data.nodes.forEach(n => connCount[n.id] = 0);
                (data.links || []).forEach(l => {
                    const sid = l.source.id || l.source; const tid = l.target.id || l.target; if
                        (connCount[sid] !== undefined) connCount[sid]++; if (connCount[tid] !== undefined) connCount[tid]++;
                });
                let maxNode = data.nodes[0]; let maxCount = connCount[maxNode.id] || 0;
                data.nodes.forEach(n => { const c = connCount[n.id] || 0; if (c > maxCount) { maxCount = c; maxNode = n; } });
                if (typeof simulation !== "undefined") {
                    simulation.on("end", () => {
                        const container =
                            document.querySelector(".graph-area"); const w = container.clientWidth, h = container.clientHeight; const scale =
                                zoomLevel || 1; const tx = w / 2 - (maxNode.x || 0) * scale; const ty = h / 2 - (maxNode.y || 0) * scale;
                        svg.transition().duration(500).call(currentZoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
                    });
                }
            }




        </script>

</body>
